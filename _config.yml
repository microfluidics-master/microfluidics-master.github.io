title: "Master in Microfluidics & Miniaturization"
description: "Interdisciplinary program at Sorbonne Université / PSL (IPGG): microfluidics, soft matter, and applications."
url: "https://microfluidics-master.github.io"
remote_theme: jekyll/minima
# theme: minima

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: "en"
    values:
      lang: "en"
  - scope:
      path: "fr"
    values:
      lang: "fr"

header_pages:
  - en/index.md
  - en/presentation.md
  - en/degree-information.md
  - en/contact.md

markdown: kramdown
highlighter: rouge

author:
  name: "Microfluidics Master Program"
  email: "contact@example.edu"
