title: "Master in Microfluidics & Miniaturization"
description: "Interdisciplinary program at Sorbonne Université / PSL (IPGG)"
url: "https://microfluidics-master.github.io"

# Choose ONE (keep remote_theme OR theme)
remote_theme: jekyll/minima
# theme: minima

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: "en"
    values:
      lang: "en"
  - scope:
      path: "fr"
    values:
      lang: "fr"

header_pages:
  - en/index.md
  - en/presentation.md
  - en/degree-information.md
  - en/contact.md

markdown: kramdown
highlighter: rouge
