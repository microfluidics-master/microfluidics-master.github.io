<header class="site-header" role="banner">
  <div class="wrapper">
    <a class="site-title" rel="author" href="{% if page.lang == 'fr' %}{{ '/fr/' | relative_url }}{% else %}{{ '/en/' | relative_url }}{% endif %}">
      {{ site.title | escape }}
    </a>
    <nav class="site-nav">
      <input type="checkbox" id="nav-trigger" class="nav-trigger" />
      <label for="nav-trigger">
        <span class="menu-icon">
          <svg viewBox="0 0 18 15" width="18" height="15" aria-hidden="true">
            <path d="M18,1.5v2H0v-2H18z M18,6.5v2H0v-2H18z M18,11.5v2H0v-2H18z"/>
          </svg>
        </span>
      </label>
      <div class="trigger">
        {% assign current_lang = page.lang | default: 'en' %}
        {% assign items = site.pages
           | where: 'lang', current_lang
           | where_exp: 'p', 'p.nav_exclude != true'
           | sort: 'nav_weight' %}
        {% for p in items %}
          {% if p.title and p.url %}
            <a class="page-link" href="{{ p.url | relative_url }}">{{ p.title }}</a>
          {% endif %}
        {% endfor %}
      </div>
    </nav>
  </div>
</header>
