---
layout: default
---
<div class="home">
  {{ content }}
  {% if site.posts.size > 0 %}
  <h2>Latest News</h2>
  <ul class="post-list">
    {% for post in site.posts limit:5 %}
    <li>
      <span class="post-meta">{{ post.date | date: "%Y-%m-%d" }}</span>
      <h3><a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a></h3>
      <p>{{ post.excerpt }}</p>
    </li>
    {% endfor %}
  </ul>
  {% endif %}
</div>
